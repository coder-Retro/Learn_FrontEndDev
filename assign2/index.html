    <title>Form</title>

  <body>
    <div class="form">
      <p></p>
      Full Name:<br>

      <input type="text" placeholder="26B-1234">

      Create Password:<br>
      <input type="password" placeholder="********">

      <input type="radio" name="gender"> Male
      <br>
      <input type="radio" name="gender"> Female
      <br><br>
      Choose Your Interests:<br><br>

      <br>
      <input type="checkbox"> Freelancing
      <br>

      <br><br>
      Select Course:<br>
      <select name="Courses">
        <option disabled selected>Select a Course</option>
        <option>Graphic Design</option>

      <br><br>
      <button type="submit">Submit Enrollment</button>
      </p>
    </div>
