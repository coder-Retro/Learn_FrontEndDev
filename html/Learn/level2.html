<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Level2</title>
  </head>
  <body>
    <!-- heading tags (h1-h6) : (largest to smallest) -->
    <h1>Heading 1</h1>
    <h2>Heading 2</h2>
    <h3>Heading 3</h3>
    <h4>Heading 4</h4>
    <h5>Heading 5</h5>
    <h6>Heading 6</h6>
    <!-- paragraph tag -->
    <p>This is a paragraph,Spaces and next line are not preserved.</p>
    <!-- pre tag -->
    <pre>This is a pre tag,Spaces and next line are is preserved.</pre>
    <!-- anchor tag (hyperlinks) -->
    <a href="https://github.com/coder-Retro/">Github</a>
    <br> <!-- br tag (add line break) -->
    <a href="page2.html">Page 2</a>
    <!-- img tag (insert image) -->
    <img src="img/frontEnd.jpg" alt="html, css and js logos">
    <!-- bold, italic and underline tags -->
    <b>Bold</b>
    <i>Italic</i>
    <u>Underline</u>
    <br>
    <!-- big and small tags -->
    <big>Big Text</big>
    <small>Small Text</small>
    <br>
    <!-- hr tag (horizontal ruler) -->
    <hr>
    <!-- sup and sub tags (superscript and subscript) -->
    10<sup>2</sup>
    <br>
    H<sub>2</sub>O
    <br>
    <!-- html attributes (Extra properties added to tags) -->

  </body>
</html>
